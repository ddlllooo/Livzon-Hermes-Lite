services:
  hermes-lite:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${HERMES_IMAGE:-hermes-lite:prod}
    container_name: ${HERMES_CONTAINER_NAME:-hermes-lite}
    env_file:
      - .env
    environment:
      HERMES_HOME: /data/hermes
      DAZAH_API_BASE_URL: ${DAZAH_API_BASE_URL:-http://app:8000/api/v1}
      DAZAH_LLM_BASE_URL: ${DAZAH_LLM_BASE_URL:-http://app:8000/api/v1/agent/llm}
      DAZAH_LLM_MODEL: ${DAZAH_LLM_MODEL:-dazah-active-text}
      HERMES_DAZAH_CHAT_TIMEOUT_SECONDS: ${HERMES_DAZAH_CHAT_TIMEOUT_SECONDS:-180}
      HERMES_DAZAH_MAX_TOOL_ITERATIONS: ${HERMES_DAZAH_MAX_TOOL_ITERATIONS:-30}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${HERMES_BIND_HOST:-127.0.0.1}:${HERMES_PORT:-8100}:8100"
    volumes:
      - hermes_data:/data/hermes
    networks:
      - backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: "${HERMES_CPU_LIMIT:-0.75}"
    mem_limit: "${HERMES_MEMORY_LIMIT:-1g}"
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3).read()\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: ${HERMES_LOG_MAX_SIZE:-20m}
        max-file: ${HERMES_LOG_MAX_FILE:-5}

networks:
  backend:
    external: true
    name: ${BACKEND_NETWORK:-dazah-backend_default}

volumes:
  hermes_data:
    name: ${HERMES_DATA_VOLUME:-hermes_lite_data}
